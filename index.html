<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Birthday Scheduler</h1>
            <p>Never miss a special day again</p>
        </header>

        <section class="card form-section">
            <h2>Add New Birthday</h2>
            <form id="birthday-form">
                <div class="form-group">
                    <label for="person-name">Person's Name</label>
                    <input type="text" id="person-name" required placeholder="e.g. Jane Doe">
                </div>
                <div class="form-group">
                    <label for="birth-date">Birthdate</label>
                    <input type="date" id="birth-date" required>
                </div>
                <button type="submit" id="save-btn" class="btn">Save Birthday</button>
            </form>
        </section>

        <section class="card list-section">
            <h2>Upcoming Birthdays</h2>
            <div id="birthday-list" class="birthday-list">
                <!-- Birthdays will be rendered here -->
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
